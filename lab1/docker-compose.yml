# docker-compose.yml
version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: bigdata_lab1_postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: bigdata_lab1
    ports:
      - "5432:5432" 
    volumes:
      - postgres_data:/var/lib/postgresql/data 
      - ./data:/docker-entrypoint-initdb.d 

volumes:
  postgres_data: