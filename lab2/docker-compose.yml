version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: lab2_postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: bigdata_lab2
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - lab2_network

  clickhouse:
    image: clickhouse/clickhouse-server:23.8
    container_name: lab2_clickhouse
    ports:
      - "8123:8123"
      - "9000:9000"
    networks:
      - lab2_network

  spark:
    image: jupyter/pyspark-notebook:spark-3.5.0
    container_name: lab2_spark
    ports:
      - "8888:8888"
      - "4040:4040"
    volumes:
      - ./spark_apps:/home/jovyan/app
      - ./data:/home/jovyan/data
      - ./BigDataSpark/исходные\ данные:/home/jovyan/data/raw
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=bigdata_lab2
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=admin
      - CLICKHOUSE_HOST=clickhouse
      - CLICKHOUSE_HTTP_PORT=8123
    networks:
      - lab2_network
    depends_on:
      - postgres
      - clickhouse
    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 2G

networks:
  lab2_network:
    driver: bridge

volumes:
  postgres_data:
  clickhouse_data: